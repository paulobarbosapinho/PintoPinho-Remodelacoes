<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PintoPinho Remodelações - Portfólio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .logo-container {
            background-color: white;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            margin: -50px auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 3px solid #f59e0b;
            z-index: 10;
            position: relative;
        }
        .hidden { display: none; }
        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .gallery-item {
            min-width: 250px;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <header class="bg-slate-900 text-white pt-12 pb-16 text-center">
        <h1 class="text-2xl font-bold tracking-widest uppercase">PintoPinho</h1>
        <p class="text-xs opacity-75 italic">Remodelações</p>
    </header>

    <div class="max-w-md mx-auto px-4">
        <div class="logo-container">
            <img src="https://static.wixstatic.com/media/11062b_6e2c5579935747d58f0fa1e1fde0ce4b~mv2.jpg" alt="Logo" class="w-full h-full object-cover">
        </div>

        <div class="mt-6">
            <h2 class="text-lg font-bold mb-3 text-slate-800 uppercase text-xs tracking-wider">Trabalhos Recentes</h2>
            <div class="gallery-scroll">
                <img src="https://static.wixstatic.com/media/11062b_8eb3e1d795c547e88656bc37a68a0b47~mv2.jpg" class="gallery-item" alt="Cozinha">
                <img src="https://static.wixstatic.com/media/11062b_1232b8130b0644f9ab3d5ba4bf33d335~mv2_d_3757_2500_s_4_2.jpg" class="gallery-item" alt="WC">
                <img src="https://static.wixstatic.com/media/a25703950281458cb936a2868215854f.jpg" class="gallery-item" alt="Pavimento">
            </div>
            
            <a href="https://www.facebook.com/Pintopinhoremodelacoes/videos" target="_blank" class="mt-3 flex items-center justify-center w-full p-3 bg-blue-50 text-blue-700 rounded-xl border border-blue-200 text-sm font-bold">
                <i class="fab fa-facebook-square mr-2 text-lg"></i> Ver vídeos das nossas obras
            </a>
        </div>

        <div class="space-y-6 mt-8">
            <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-slate-800">
                <h2 class="text-lg font-bold mb-4 text-gray-800"><i class="fas fa-file-invoice mr-2 text-yellow-500"></i>Pedir Orçamento</h2>
                
                <input type="text" id="nome" placeholder="Seu Nome" class="w-full p-3 border rounded-lg bg-gray-50 mb-3 outline-none focus:border-yellow-500">
                <input type="tel" id="telefone" placeholder="Seu Telemóvel" class="w-full p-3 border rounded-lg bg-gray-50 mb-3 outline-none focus:border-yellow-500">
                <input type="text" id="local" placeholder="Localidade da Obra" class="w-full p-3 border rounded-lg mb-3 bg-gray-50 outline-none focus:border-yellow-500">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="flex items-center text-sm">
                        <input type="radio" name="tipo_casa" value="Moradia" id="moradia" checked onclick="toggleAndar(false)" class="mr-2">
                        <label for="moradia">Moradia</label>
                    </div>
                    <div class="flex items-center text-sm">
                        <input type="radio" name="tipo_casa" value="Apartamento" id="apartamento" onclick="toggleAndar(true)" class="mr-2">
                        <label for="apartamento">Apartamento</label>
                    </div>
                </div>

                <div id="campo_andar" class="hidden mb-4">
                    <input type="text" id="andar" placeholder="Andar (Ex: 2º Frente)" class="w-full p-3 border rounded-lg bg-gray-50 outline-none focus:border-yellow-500">
                </div>

                <select id="servico" class="w-full p-3 border rounded-lg mb-4 bg-gray-50">
                    <option value="Pintura Geral">Pintura Geral</option>
                    <option value="Pavimento Flutuante/Vinil">Pavimentos</option>
                    <option value="Pladur/Tetos Falsos">Pladur</option>
                    <option value="Remodelação WC/Cozinha">WC ou Cozinha</option>
                    <option value="Outros">Outros Trabalhos</option>
                </select>

                <textarea id="detalhes" rows="2" placeholder="Descreva brevemente o projeto..." class="w-full p-3 border rounded-lg mb-6 bg-gray-50"></textarea>

                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6">
                    <p class="text-[11px] text-yellow-800 leading-tight italic">
                        <strong>Visita Técnica (30€):</strong> Valor cobrado pela medição e orçamento, reembolsado se o trabalho for aceite.
                    </p>
                </div>

                <button onclick="enviarPedido()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition">
                    <i class="fab fa-whatsapp text-xl"></i>
                    SOLICITAR ORÇAMENTO
                </button>
            </div>
        </div>
    </div>

    <footer class="text-center p-8 text-gray-400 text-xs">
        &copy; 2024 PintoPinho Remodelações
    </footer>

    <script>
        function toggleAndar(show) {
            const divAndar = document.getElementById('campo_andar');
            show ? divAndar.classList.remove('hidden') : divAndar.classList.add('hidden');
        }

        function enviarPedido() {
            const numero = "351914318884";
            const nome = document.getElementById('nome').value;
            const tel = document.getElementById('telefone').value;
            const local = document.getElementById('local').value;
            const tipo = document.querySelector('input[name="tipo_casa"]:checked').value;
            const andar = document.getElementById('andar').value;
            const servico = document.getElementById('servico').value;
            const detalhes = document.getElementById('detalhes').value;

            if(!nome || !tel || !local) {
                alert("Por favor, preencha os campos obrigatórios.");
                return;
            }

            let msg = `Olá Pinto & Pinho! 👋%0A%0A`;
            msg += `*DADOS DA OBRA*%0A`;
            msg += `👤 Nome: ${nome}%0A`;
            msg += `📞 Tel: ${tel}%0A`;
            msg += `📍 Local: ${local}%0A`;
            msg += `🏠 Tipo: ${tipo} ${tipo === 'Apartamento' ? '('+andar+')' : ''}%0A`;
            msg += `🛠️ Serviço: ${servico}%0A`;
            if(detalhes) msg += `📝 Notas: ${detalhes}%0A%0A`;
            msg += `*Ciente da taxa de visita de 30€ (restituível).*`;

            window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
        }
    </script>
</body>
</html>
